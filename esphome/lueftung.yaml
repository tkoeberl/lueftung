# Drehzahlsteuerung der Lüfter
script:
  - id: script_intensive
    mode: restart
    then:
    - script.stop: script_cross
    - script.stop: script_efficient
    - lambda: |-
        ESP_LOGD("script_intensive", "call script_efficient");
    - script.execute: script_efficient
    - delay: 900s  
    - lambda: |-
        ESP_LOGD("script_intensive", "stop script_efficient");    
    - script.stop: script_efficient  
    - delay: 6300s
    - lambda: |-
        ESP_LOGD("script_intensive", "call script_intensive recursive.");
        id(script_intensive).execute();

  - id: script_efficient
    mode: restart 
    then:
    - script.stop: script_cross
    - lambda: |-
        ESP_LOGD("script_efficient", "Starte efficient-Drehung mit Level: %d", id(current_level));
        float perc=id(current_percentage);
        ESP_LOGI("script_efficient", "Using percentage: %0.3f",perc);
        
        for (int fan = 1; fan <= 4; fan++) {
          float level = (fan % 2 == 1) ? (1.0f - perc) : perc;
          id(set_luefter_level).execute(fan, level);
        }

    - delay: !lambda 'return id(current_interval);'  
    - lambda: |-
        ESP_LOGD("script_efficient", "Starte efficient-Drehung mit Level: %d", id(current_level));
        float perc=id(current_percentage);
        for (int fan = 1; fan <= 4; fan++) {
          float level = (fan % 2 == 1) ? perc : (1.0f - perc);
          id(set_luefter_level).execute(fan, level);
        }        
    - delay: !lambda 'return id(current_interval);'    
    - lambda: |-
        id(script_efficient).execute();        

  - id: script_cross
    then:
      - script.stop: script_efficient
      - script.stop: script_intensive
      - lambda: |-
          std::string programm = id(current_program) ;
          ESP_LOGD("cross_script", "Starte cross-Drehung mit percentage: %f; dir: %s", id(current_percentage), programm.c_str());
          float perc = id(current_percentage);
          float level=0;
          if (programm=="cross_1") {
            ESP_LOGD("cross_script", "Starte cross-Drehung mit dir: %d", level);
            id(set_luefter_level).execute(1, 1.0f - perc);
            id(set_luefter_level).execute(2, perc);
            id(set_luefter_level).execute(3, 1.0f - perc);
            id(set_luefter_level).execute(4, perc);
            //level = (fan <= 4) ? perc : (1.0f - perc);
          }
          else{
            id(set_luefter_level).execute(1, perc);
            id(set_luefter_level).execute(2, 1.0f - perc);
            id(set_luefter_level).execute(3, perc);
            id(set_luefter_level).execute(4, 1.0f - perc);
          }

  - id: script_update
    then:
      - script.stop: script_cross
      - script.stop: script_efficient
      - script.stop: script_intensive
      - lambda: |-
          ESP_LOGI("script_update", "current_program: %s , current_level:%d", id(current_program).c_str(), id(current_level) );

          int intervals[6] = {99999999, 70000, 65000, 60000, 55000, 50000};
          id(current_interval) = intervals[id(current_level)];
          
          float perc[6] = {0.5f, 0.4f, 0.3f, 0.2f, 0.1f, 0.01f};
          id(current_percentage) = perc[id(current_level)];
          
          if (id(current_level) > 0 && id(current_level) <= 5) {
            id(current_percentage) = perc[id(current_level)];
          } else if(id(current_level) == 0){
            id(current_percentage)=0.5f;
          } else {
            ESP_LOGW("lueftersteuerung", "Ungültiges level: %d (nur 1–5 erlaubt)", id(current_level));
            //Setze Lüfter auf die korrekten Level
            id(current_percentage) = 0;
            for (int fan = 1; fan <= 3; fan++) {
              id(set_luefter_level).execute(fan, id(current_percentage));
            }
            return;
          }
          
          if (id(current_program) == "cross_1" || id(current_program) == "cross_2"){
            id(script_cross).execute();
          } else if (id(current_program) == "efficient") {
            id(script_efficient).execute();
          } else if (id(current_program) == "intensive") {
            id(script_intensive).execute();                        
          } else {
            ESP_LOGW("script_update", "Unbekanntes Programm: %s", id(current_program).c_str());
          }
      - delay: 200ms
      - component.update: epaper_display

  - id: set_luefter_level
    parameters:
      luefter: int
      level: float 
    then:
      - lambda: |-
          ESP_LOGD("lueftersteuerung", "Setze Lüfter %d auf PWM-Level: %0.3f", luefter, level);
          switch (luefter) {
            case 1:
              id(luefter_1_pwm).set_level(level);
              id(current_luefter_1_pwm) = level;
              id(sensor_luefter_1_perc).publish_state(level * 100.0);
              break;
            case 2:
              id(luefter_2_pwm).set_level(level);
              id(current_luefter_2_pwm) = level;
              id(sensor_luefter_2_perc).publish_state(level * 100.0);
              break;
            case 3:
              id(luefter_3_pwm).set_level(level);
              id(current_luefter_3_pwm) = level;
              id(sensor_luefter_3_perc).publish_state(level * 100.0);
              break;    
            case 4:
              id(luefter_4_pwm).set_level(level);
              id(current_luefter_4_pwm) = level;
              id(sensor_luefter_4_perc).publish_state(level * 100.0);
              break;                                                            
            default:
              ESP_LOGW("lueftersteuerung", "Ungültige Lüfternummer: %d", luefter);
              break;
          }
sensor:        
  - platform: template
    name: "Lüfter 1"
    id: sensor_luefter_1_perc
    unit_of_measurement: "%"
    accuracy_decimals: 3
  - platform: template
    name: "Lüfter 2"
    id: sensor_luefter_2_perc
    unit_of_measurement: "%"
    accuracy_decimals: 3
  - platform: template
    name: "Lüfter 3"
    id: sensor_luefter_3_perc
    unit_of_measurement: "%"
    accuracy_decimals: 3
  - platform: template
    name: "Lüfter 4"
    id: sensor_luefter_4_perc
    unit_of_measurement: "%"
    accuracy_decimals: 4    
  - platform: template
    name: "Ventilator Betriebsstunden"
    id: betrieb_hours
    unit_of_measurement: "h"
    accuracy_decimals: 1
    icon: "mdi:timer-outline"
    lambda: |-
      return id(betrieb_seconds) / 3600.0;
    update_interval: 60s       

