esphome:
  name: "lueftereg"
  friendly_name: lueftereg
  min_version: 2025.11.0
  name_add_mac_suffix: false
  on_boot:
    priority: -100
    then:
      - lambda: |-
          if (id(current_program).empty())
            id(current_program) = "cross_1";

          if (id(current_level) < 0 || id(current_level) > 5)
            id(current_level) = 0;  
      - lambda: |-
          id(program_select).publish_state(id(current_program));
          id(luefter_level).publish_state(id(current_level));
      - script.execute: script_update


esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"


wifi:
  #ssid: !secret wifi_ssid
  #password: !secret wifi_password
  # Enable fallback AP if WiFi fails
  ap:
    ssid: "Windfried"
    # password: "optional_password"

captive_portal:

web_server:
  port: 80

mdns:
  disabled: false

logger:
  logs: 
    component: WARN
  level: WARN

api:
    services:
    - action: set_luefter_level
      variables:
        luefter: int
        level: float
      then:
        - script.execute:
            id: set_luefter_level
            luefter: !lambda 'return luefter;'
            level: !lambda 'return level;'

ota:
  platform: esphome

globals:
  - id: current_program
    type: std::string
    restore_value: true
  - id: last_program
    type: std::string
    restore_value: true    
  - id: current_level
    type: int
    restore_value: true
  - id: last_level
    type: int
    restore_value: true    
  - id: current_percentage
    type: float
    restore_value: false  # Kein Wert wird beim Neustart wiederhergestellt
    initial_value: '0'
  - id: current_interval
    type: int
    restore_value: false  # Kein Wert wird beim Neustart wiederhergestellt
    initial_value: '0'  
  - id: mode_index
    type: int
    initial_value: '0'    
  - id: current_luefter_1_pwm
    type: float
    restore_value: false  # Kein Wert wird beim Neustart wiederhergestellt
    initial_value: '0'
  - id: current_luefter_2_pwm
    type: float
    restore_value: false  # Kein Wert wird beim Neustart wiederhergestellt
    initial_value: '0'
  - id: current_luefter_3_pwm
    type: float
    restore_value: false  # Kein Wert wird beim Neustart wiederhergestellt
    initial_value: '0'        
  - id: current_luefter_4_pwm
    type: float
    restore_value: false  # Kein Wert wird beim Neustart wiederhergestellt
    initial_value: '0' 
  - id: betrieb_seconds
    type: uint32_t
    restore_value: true
    initial_value: '0'    
  - id: filter_limit_hours
    type: float
    restore_value: false
    initial_value: '4000.0'    

# Definiere die PWM-Ausgänge für die Lüfter
output:
  - platform: ledc
    id: luefter_1_pwm
    pin: GPIO25
    frequency: 2000Hz 
    inverted: false
  - platform: ledc
    id: luefter_2_pwm
    pin: GPIO26
    frequency: 2000Hz 
    inverted: false
  - platform: ledc
    id: luefter_3_pwm
    pin: GPIO32
    frequency: 2000Hz 
    inverted: false    
  - platform: ledc
    id: luefter_4_pwm
    pin: GPIO33
    frequency: 2000Hz 
    inverted: false

button:
  - platform: template
    name: "reboot"
    on_press:
      - logger.log: "Manual reboot"
      - delay: 300ms
      - lambda: |-      
          ESP_LOGI("reboot", "current_program: %s , current_level: %d", id(current_program).c_str(), id(current_level) );
      - button.press: reboot_button
  - platform: restart
    id: reboot_button
    internal: true  # Dieser Button wird nicht in Home Assistant angezeigt
  - platform: template
    name: "Betriebsstunden zurücksetzen"
    icon: "mdi:restart"
    on_press:
      - lambda: |-
          id(betrieb_seconds) = 0;  
          id(script_update).execute();

select:
  - platform: template
    name: "Lüfterprogramm"
    id: program_select
    options:
      - "cross_1"
      - "cross_2"
      - "efficient"
      - "intensive"
    optimistic: true
    restore_value: true
    set_action:
      - logger.log:
          format: "Ausgewähltes Programm: %s.c_str()"
          args: ['x']
      - lambda: |-
          // wir wandeln x in einen int-Code um
          if (x == "cross_1") {
            id(last_program) = id(current_program);
            id(current_program)="cross_1";
            id(program_select).publish_state("cross_1");
            id(script_update).execute();
          }
          else if (x == "cross_2") {
            id(last_program) = id(current_program);
            id(current_program)="cross_2";
            id(program_select).publish_state("cross_2");
            id(script_update).execute();
          }
          else if (x == "efficient"){
            id(last_program) = id(current_program);          
            id(current_program)="efficient";
            id(program_select).publish_state("efficient");
            id(script_update).execute();
          }
          else if (x == "intensive"){
            id(last_program) = id(current_program);
            id(current_program)="intensive";
            id(program_select).publish_state("intensive");
            id(script_update).execute();
          }
          else{
            ESP_LOGW("luefter", "Unbekanntes Programm: %s", x.c_str());
          }

number:
  - platform: template
    id: luefter_level
    name: "Lüfter-Level"
    min_value: 0
    max_value: 5
    step: 1
    mode: slider
    restore_value: true
    set_action:
      - lambda: |-
          int level = (int)x;
          ESP_LOGI("luefter", "Neues Level: %d", level);
          id(last_level) = id(current_level);
          id(luefter_level).publish_state(level);
          id(current_level)=level;
          id(script_update).execute();
interval:
  - interval: 60s
    then:
      - lambda: |-
          if (id(current_level) > 0) {
            id(betrieb_seconds) += 60;
          }
  - interval: 3600s
    then:
      - lambda: |-
          if (id(current_level) > 0) {
            id(betrieb_seconds) += 3600;
          }

          bool filter_needed = (id(betrieb_seconds) / 3600.0) >= id(filter_limit_hours);
          id(filter_change_required).publish_state(filter_needed);          

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO34
      mode: INPUT
      inverted: true
    name: "binary_program"
    id: binary_program
    internal: true
    filters:
      - delayed_on: 10ms  # Entprellung
    on_press:
      then:
        - lambda: |-
            id(mode_index) += 1;
            if (id(mode_index) > 4) id(mode_index) = 0;

            switch (id(mode_index)) {
              case 0:
                id(last_program) = id(current_program);
                id(program_select).publish_state("cross_1");
                id(current_program)="cross_1";
                break;
              case 1:
                id(last_program) = id(current_program);
                id(program_select).publish_state("cross_2");
                id(current_program)="cross_2";
                break;
              case 2:
                id(last_program) = id(current_program);
                id(program_select).publish_state("efficient");
                id(current_program)="efficient";
                break;
              case 3:
                id(last_program) = id(current_program);
                id(program_select).publish_state("intensive");
                id(current_program)="intensive";
                break;
            }
            id(script_update).execute();
  - platform: template
    name: "Filterwechsel erforderlich"
    id: filter_change_required
    device_class: problem
    icon: "mdi:air-filter"
    lambda: |-
      return (id(betrieb_seconds) / 3600.0) >= id(filter_limit_hours);
          

  - platform: gpio
    pin:
      number: GPIO35
      mode: INPUT
      inverted: false
    name: "binary_level"
    id: binary_level
    internal: true
    filters:
      - delayed_on: 10ms  
    on_press:
      then:
        - lambda: |-
            id(last_level) = id(current_level);
            id(current_level) += 1;
            if (id(current_level) > 5) id(current_level) = 0;
            id(luefter_level).publish_state(id(current_level));
            id(script_update).execute();

spi: 
  clk_pin: GPIO14 #scl green
  mosi_pin: GPIO27 # sda yellow

display: 
  - platform: waveshare_epaper
    model: 2.90inV2
    id: epaper_display
    cs_pin: GPIO23 #blue
    dc_pin: GPIO22 # white was22
    reset_pin: GPIO21 #orange
    busy_pin: GPIO4 #purple
    rotation: 90°
    full_update_every: 1
    update_interval: 24h
    lambda: |-
      it.fill(COLOR_OFF);
      ESP_LOGD("epaper_display", "updating epaper_display: programm: %s", id(current_program).c_str());

      it.image(45, 0, id(ventman_icon)); 

      int luefter_lvl = id(luefter_level).state;
      switch (luefter_lvl) {
        case 0: it.image(45, 64, id(fan_level_0_icon)); break;
        case 1: it.image(45, 64, id(fan_level_1_icon)); break;
        case 2: it.image(45, 64, id(fan_level_2_icon)); break;
        case 3: it.image(45, 64, id(fan_level_3_icon)); break;
        case 4: it.image(45, 64, id(fan_level_4_icon)); break;
        case 5: it.image(45, 64, id(fan_level_5_icon)); break;
      }

      if (id(current_program) == "cross_1") {
        it.print(62, 13, id(font_med), "Quer vorwärts");
      } else if (id(current_program) == "cross_2") {
        it.print(58, 13, id(font_med), "Quer rückwärts");
      } else if (id(current_program) == "efficient") {
        it.print(90, 13, id(font_med), "Effizient");
      } else if (id(current_program) == "intensive") {
        it.print(75, 13, id(font_med), "Stoßlüftung");
      }

      float used_hours = id(betrieb_seconds) / 3600.0;
      float remaining_hours = id(filter_limit_hours) - used_hours;

      if (remaining_hours > 0) {
        it.printf(3, 119, id(font_mini), "Filterwechsel in: %.0f Tagen", remaining_hours/24);  
      } else {
        it.print(3, 119, id(font_mini), "FILTER WECHSELN!");
      }

   

